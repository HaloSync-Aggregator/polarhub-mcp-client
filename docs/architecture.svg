<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Main server outline -->
  <rect x="20" y="12" width="560" height="240" rx="10" fill="#faf8ff" stroke="#6442d6" stroke-width="1.2"/>
  <text x="300" y="36" text-anchor="middle" font-size="12" font-weight="600" fill="#6442d6">Unified Server (port 3000)</text>

  <!-- Express -->
  <rect x="48" y="54" width="152" height="56" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="124" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#030711">Express</text>
  <text x="124" y="96" text-anchor="middle" font-size="10" fill="#6b7280">Static files</text>

  <!-- WebSocket -->
  <rect x="224" y="54" width="152" height="56" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="300" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#030711">WebSocket</text>
  <text x="300" y="96" text-anchor="middle" font-size="10" fill="#6b7280">/ws</text>

  <!-- Vite -->
  <rect x="400" y="54" width="152" height="56" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="476" y="78" text-anchor="middle" font-size="12" font-weight="600" fill="#030711">Vite</text>
  <text x="476" y="96" text-anchor="middle" font-size="10" fill="#6b7280">HMR (dev)</text>

  <!-- Connectors -->
  <line x1="124" y1="110" x2="124" y2="140" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="300" y1="110" x2="300" y2="140" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="476" y1="110" x2="476" y2="140" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Orchestrator -->
  <rect x="48" y="140" width="504" height="92" rx="6" fill="#f8faf9" stroke="#21a35d" stroke-width="1"/>
  <text x="300" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1a7a44">Orchestrator</text>
  <line x1="88" y1="178" x2="512" y2="178" stroke="#d5eddf" stroke-width="0.8"/>
  <text x="300" y="198" text-anchor="middle" font-size="11" fill="#374151">LLM Intent Parsing</text>
  <text x="300" y="216" text-anchor="middle" font-size="10" fill="#6b7280">MCP Tool call  ·  Result summarization  ·  Session state</text>

  <!-- Arrow to LLM -->
  <path d="M180,232 L180,280 L160,280 L160,330" stroke="#9ca3af" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow to MCP -->
  <path d="M420,232 L420,280 L440,280 L440,330" stroke="#9ca3af" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>

  <!-- LLM API -->
  <rect x="40" y="330" width="240" height="70" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="160" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#030711">LLM API</text>
  <text x="160" y="380" text-anchor="middle" font-size="10" fill="#6b7280">GPT-4  ·  Gemini  ·  Bedrock</text>

  <!-- MCP Server -->
  <rect x="320" y="330" width="240" height="70" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="440" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#030711">MCP Server</text>
  <text x="440" y="380" text-anchor="middle" font-size="10" fill="#6b7280">External · Streamable HTTP</text>
</svg>
